name: Build Blipo

# Builds on every push to main (downloadable as run artifacts), and publishes a
# GitHub Release with the builds attached whenever you push a version tag (v*).
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.4.1"          # must match the editor you build with locally
  GODOT_REL: "4.4.1-stable"
  GODOT_TEMPLATES: "4.4.1.stable"

jobs:
  export:
    name: Export Windows + Web
    runs-on: ubuntu-latest
    permissions:
      contents: write              # needed to publish a Release on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot and export templates
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_REL}"
          wget -q "${BASE}/Godot_v${GODOT_REL}_linux.x86_64.zip" -O godot.zip
          wget -q "${BASE}/Godot_v${GODOT_REL}_export_templates.tpz" -O templates.tpz
          mkdir -p "$HOME/bin"
          unzip -q godot.zip
          mv "Godot_v${GODOT_REL}_linux.x86_64" "$HOME/bin/godot"
          chmod +x "$HOME/bin/godot"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES}"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATES}/"

      - name: Install Wine and rcedit (embeds Blipo.ico into the Windows .exe)
        # The icon is a nice-to-have, never a build blocker: this step is allowed
        # to fail and every command is guarded, so the export still runs either way.
        continue-on-error: true
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends wine64 || sudo apt-get install -y --no-install-recommends wine || true
          WINE_BIN="$(command -v wine64 || command -v wine || true)"
          if [ -z "$WINE_BIN" ]; then
            for c in /usr/bin/wine64 /usr/bin/wine /usr/lib/wine/wine64 /usr/lib/wine/wine; do
              if [ -x "$c" ]; then WINE_BIN="$c"; break; fi
            done
          fi
          echo "Wine binary: ${WINE_BIN:-NOT FOUND}"
          wget -q https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -O "$HOME/rcedit-x64.exe" || true
          mkdir -p "$HOME/.config/godot"
          for SETTINGS in editor_settings-4.tres editor_settings-4.4.tres; do
            {
              echo '[gd_resource type="EditorSettings" format=3]'
              echo ''
              echo '[resource]'
              echo "export/windows/rcedit = \"$HOME/rcedit-x64.exe\""
              echo "export/windows/wine = \"${WINE_BIN}\""
            } > "$HOME/.config/godot/$SETTINGS"
          done

      - name: Import resources
        # First headless pass builds the .godot import cache so the export has
        # everything it needs. Warnings here are harmless.
        run: godot --headless --import || true

      - name: Export builds
        run: |
          set -e
          mkdir -p builds/windows builds/web
          godot --headless --export-release "Windows Desktop" builds/windows/Blipo.exe
          godot --headless --export-release "Web" builds/web/index.html

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: blipo-windows
          path: builds/windows

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: blipo-web
          path: builds/web

      # ----- Release (only when a v* tag is pushed) -----
      - name: Package builds for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          ( cd builds/windows && zip -q -r "$GITHUB_WORKSPACE/Blipo-Windows.zip" . )
          ( cd builds/web && zip -q -r "$GITHUB_WORKSPACE/Blipo-Web.zip" . )

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Blipo ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            Blipo-Windows.zip
            Blipo-Web.zip
